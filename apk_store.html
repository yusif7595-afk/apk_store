<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuska APK Anbarı</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface2: #1c2030;
    --border: #252a3a;
    --accent: #4f8ef7;
    --accent2: #7c3aed;
    --success: #22c55e;
    --warning: #f59e0b;
    --text: #e8eaf0;
    --text2: #8892aa;
    --text3: #5a6478;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }

  /* Header */
  header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(13,15,20,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .header-stats {
    display: flex;
    gap: 16px;
    font-size: 13px;
    color: var(--text2);
    font-family: var(--mono);
  }

  .stat-val { color: var(--accent); font-weight: 600; }

  /* Upload zone */
  .upload-zone {
    margin: 24px;
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    position: relative;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(79,142,247,0.05);
  }

  .upload-zone input {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .upload-icon { font-size: 36px; margin-bottom: 12px; }

  .upload-title {
    font-size: 16px; font-weight: 600; margin-bottom: 6px;
  }

  .upload-sub {
    font-size: 13px; color: var(--text2);
  }

  /* Progress */
  .progress-wrap {
    margin: 0 24px 24px;
    display: none;
  }

  .progress-wrap.active { display: block; }

  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 13px; color: var(--text2); margin-bottom: 8px;
    font-family: var(--mono);
  }

  .progress-bar {
    height: 6px; background: var(--border); border-radius: 99px; overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    width: 0%;
    transition: width 0.3s;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 14px;
    display: flex; align-items: center; gap: 10px;
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    max-width: 300px;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--success); }
  .toast.error { border-color: #ef4444; }

  /* Filter bar */
  .filter-bar {
    margin: 0 24px 16px;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }

  .search-box {
    flex: 1; min-width: 180px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text3); }

  .sort-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text2);
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .sort-btn:hover, .sort-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Section title */
  .section-title {
    margin: 0 24px 12px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: var(--mono);
  }

  /* APK list */
  .apk-list {
    padding: 0 24px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .apk-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.2s;
    animation: fadeIn 0.3s ease;
  }

  .apk-card:hover {
    border-color: rgba(79,142,247,0.4);
    background: var(--surface2);
    transform: translateY(-1px);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .apk-num {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text3);
    min-width: 28px;
    text-align: center;
  }

  .apk-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .apk-info { flex: 1; min-width: 0; }

  .apk-name {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .apk-meta {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }

  .apk-size {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 6px;
  }

  .apk-date {
    font-size: 12px;
    color: var(--text3);
  }

  .apk-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 600;
    background: rgba(79,142,247,0.1);
    color: var(--accent);
  }

  .apk-actions {
    display: flex; gap: 8px; flex-shrink: 0;
  }

  .btn-dl {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 9px;
    padding: 9px 16px;
    color: #fff;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: flex; align-items: center; gap: 6px;
    transition: opacity 0.2s;
  }

  .btn-dl:hover { opacity: 0.85; }

  .btn-copy {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 9px 12px;
    color: var(--text2);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
  }

  .btn-copy:hover { border-color: var(--accent); color: var(--accent); }

  .btn-del {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 9px 12px;
    color: var(--text3);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
  }

  .btn-del:hover { border-color: #ef4444; color: #ef4444; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 24px;
    color: var(--text3);
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--text2); }
  .empty-sub { font-size: 14px; }

  /* Gemini script section */
  .script-section {
    margin: 0 24px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .script-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }

  .script-title {
    font-size: 14px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }

  .script-badge {
    font-size: 11px;
    background: rgba(124,58,237,0.15);
    color: var(--accent2);
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 600;
  }

  .script-body {
    padding: 16px 18px;
    font-family: var(--mono);
    font-size: 12px;
    color: #a8b4cc;
    line-height: 1.7;
    white-space: pre;
    overflow-x: auto;
    background: #0a0c10;
  }

  .kw { color: #7c3aed; }
  .str { color: #22c55e; }
  .cm { color: #3d4a5c; }
  .fn { color: #4f8ef7; }
  .num { color: #f59e0b; }

  /* Collapsible */
  .script-toggle {
    background: none; border: none;
    color: var(--text2); font-family: var(--sans);
    font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }

  .script-content { display: none; }
  .script-content.open { display: block; }

  /* Loading skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
    height: 16px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📦</div>
    Yuska APK Anbarı
  </div>
  <div class="header-stats">
    <span><span class="stat-val" id="totalCount">0</span> fayl</span>
    <span><span class="stat-val" id="totalSize">0 MB</span></span>
  </div>
</header>

<!-- Upload Zone -->
<div class="upload-zone" id="uploadZone">
  <input type="file" id="fileInput" accept=".apk,.aab,.zip,.mcaddon,.mcpack">
  <div class="upload-icon">⬆️</div>
  <div class="upload-title">APK / Fayl yüklə</div>
  <div class="upload-sub">Basa bas və ya sürüklə • APK, AAB, ZIP, MCADDON</div>
</div>

<!-- Progress -->
<div class="progress-wrap" id="progressWrap">
  <div class="progress-label">
    <span id="progressName">Yüklənir...</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<!-- Filter -->
<div class="filter-bar">
  <input class="search-box" type="text" id="searchBox" placeholder="🔍  Fayl axtar...">
  <button class="sort-btn active" id="sortNew" onclick="setSort('new')">Yeni → Köhnə</button>
  <button class="sort-btn" id="sortOld" onclick="setSort('old')">Köhnə → Yeni</button>
</div>

<div class="section-title" id="listLabel">YÜKLƏNMIŞ FAYLLAR</div>

<!-- APK List -->
<div class="apk-list" id="apkList">
  <div class="empty">
    <div class="empty-icon">📂</div>
    <div class="empty-title">Hələ fayl yoxdur</div>
    <div class="empty-sub">Yuxarıdan APK yüklə</div>
  </div>
</div>

<!-- Gemini Script -->
<div class="script-section">
  <div class="script-header">
    <div class="script-title">
      🤖 Gemini Yükləmə Skripti
      <span class="script-badge">Python</span>
    </div>
    <button class="script-toggle" onclick="toggleScript()">
      <span id="scriptToggleText">Göstər</span> ▾
    </button>
  </div>
  <div class="script-content" id="scriptContent">
    <div class="script-body" id="scriptBody"></div>
    <div style="padding:12px 18px; border-top:1px solid var(--border); display:flex; justify-content:flex-end;">
      <button class="btn-copy" onclick="copyScript()" style="font-family:var(--sans);font-size:13px;padding:8px 16px;">📋 Kopyala</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const CLOUD_NAME = 'inn1uxpz';
const API_KEY = '587277458596993';
const API_SECRET = 'e6V3Ry2o44LNzVQ19JpT8Ynl0G0';
const UPLOAD_PRESET = 'apk_store';

const STORAGE_KEY = 'yuska_apk_store_v1';
let apkData = [];
let sortMode = 'new';

// Load from localStorage
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    apkData = raw ? JSON.parse(raw) : [];
  } catch(e) { apkData = []; }
  renderList();
  updateStats();
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(apkData));
}

// Format
function fmtSize(bytes) {
  if (!bytes) return '?';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('az-AZ', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

// Upload to Cloudinary
async function uploadFile(file) {
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressName = document.getElementById('progressName');
  const progressPct = document.getElementById('progressPct');

  progressWrap.classList.add('active');
  progressName.textContent = file.name;
  progressFill.style.width = '0%';
  progressPct.textContent = '0%';

  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', UPLOAD_PRESET);
  formData.append('resource_type', 'raw');
  formData.append('public_id', `apk_store/${Date.now()}_${file.name}`);

  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/raw/upload`);

    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) {
        const pct = Math.round(e.loaded / e.total * 100);
        progressFill.style.width = pct + '%';
        progressPct.textContent = pct + '%';
      }
    };

    xhr.onload = () => {
      progressWrap.classList.remove('active');
      if (xhr.status === 200) {
        resolve(JSON.parse(xhr.responseText));
      } else {
        const err = JSON.parse(xhr.responseText);
        reject(err);
      }
    };

    xhr.onerror = () => {
      progressWrap.classList.remove('active');
      reject(new Error('Şəbəkə xətası'));
    };

    xhr.send(formData);
  });
}

// Handle file select
document.getElementById('fileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  await handleUpload(file);
  e.target.value = '';
});

// Drag and drop
const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', async (e) => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) await handleUpload(file);
});

async function handleUpload(file) {
  showToast('⬆️ Yüklənir: ' + file.name, 'info');
  try {
    const result = await uploadFile(file);
    const entry = {
      id: result.public_id,
      name: file.name,
      url: result.secure_url,
      size: result.bytes || file.size,
      uploadedAt: Date.now(),
      ext: file.name.split('.').pop().toUpperCase()
    };
    apkData.unshift(entry);
    saveData();
    renderList();
    updateStats();
    showToast('✅ Yükləndi: ' + file.name, 'success');
  } catch(err) {
    console.error(err);
    if (err.error && err.error.message && err.error.message.includes('preset')) {
      showToast('⚠️ Upload preset lazımdır — aşağıdakı təlimatı oxu', 'error');
      showPresetInstructions();
    } else {
      showToast('❌ Xəta: ' + (err.error?.message || err.message || 'Naməlum xəta'), 'error');
    }
  }
}

function showPresetInstructions() {
  const list = document.getElementById('apkList');
  list.innerHTML = `
    <div style="background:var(--surface);border:1px solid #f59e0b44;border-radius:14px;padding:20px;font-size:14px;line-height:1.8;">
      <div style="color:#f59e0b;font-weight:700;margin-bottom:12px;">⚠️ Bir dəfəlik Cloudinary ayarı lazımdır</div>
      <ol style="padding-left:20px;color:var(--text2);">
        <li><a href="https://console.cloudinary.com/settings/upload" target="_blank" style="color:var(--accent);">Cloudinary Upload Settings</a> saytına gir</li>
        <li><b style="color:var(--text);">Upload Presets</b> bölməsinə get</li>
        <li><b style="color:var(--text);">"Add upload preset"</b> düyməsinə bas</li>
        <li>Preset name: <code style="background:#0a0c10;padding:2px 6px;border-radius:4px;color:#22c55e;">apk_store</code></li>
        <li>Signing Mode: <b style="color:var(--text);">Unsigned</b></li>
        <li>Resource type: <b style="color:var(--text);">Raw</b></li>
        <li><b style="color:var(--text);">Save</b> et</li>
        <li>Sonra yenidən yüklə</li>
      </ol>
    </div>
  `;
}

// Render list
function renderList() {
  const list = document.getElementById('apkList');
  const q = document.getElementById('searchBox').value.toLowerCase();
  let data = [...apkData];

  if (q) data = data.filter(a => a.name.toLowerCase().includes(q));
  if (sortMode === 'old') data.reverse();

  document.getElementById('listLabel').textContent =
    `YÜKLƏNMIŞ FAYLLAR${q ? ' · "'+q+'"' : ''}`;

  if (!data.length) {
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">📂</div>
      <div class="empty-title">${q ? 'Nəticə tapılmadı' : 'Hələ fayl yoxdur'}</div>
      <div class="empty-sub">${q ? 'Başqa söz sına' : 'Yuxarıdan APK yüklə'}</div>
    </div>`;
    return;
  }

  list.innerHTML = data.map((a, i) => `
    <div class="apk-card" id="card_${a.id.replace(/[^a-z0-9]/gi,'_')}">
      <div class="apk-num">${(i+1).toString().padStart(2,'0')}</div>
      <div class="apk-icon">${getIcon(a.ext)}</div>
      <div class="apk-info">
        <div class="apk-name" title="${a.name}">${a.name}</div>
        <div class="apk-meta">
          <span class="apk-tag">${a.ext}</span>
          <span class="apk-size">${fmtSize(a.size)}</span>
          <span class="apk-date">${fmtDate(a.uploadedAt)}</span>
        </div>
      </div>
      <div class="apk-actions">
        <a class="btn-dl" href="${a.url}" target="_blank" download>⬇️ Yüklə</a>
        <button class="btn-copy" onclick="copyLink('${a.url}')" title="Linki kopyala">🔗</button>
        <button class="btn-del" onclick="deleteEntry('${a.id}')" title="Sil">🗑️</button>
      </div>
    </div>
  `).join('');
}

function getIcon(ext) {
  const icons = { APK:'📱', AAB:'📦', ZIP:'🗜️', MCADDON:'⛏️', MCPACK:'🎮' };
  return icons[ext] || '📄';
}

function updateStats() {
  document.getElementById('totalCount').textContent = apkData.length;
  const total = apkData.reduce((s,a) => s + (a.size||0), 0);
  document.getElementById('totalSize').textContent = fmtSize(total);
}

function deleteEntry(id) {
  if (!confirm('Bu faylı siyahıdan sil?')) return;
  apkData = apkData.filter(a => a.id !== id);
  saveData();
  renderList();
  updateStats();
  showToast('🗑️ Silindi', 'info');
}

function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => showToast('✅ Link kopyalandı!', 'success'));
}

function setSort(mode) {
  sortMode = mode;
  document.getElementById('sortNew').classList.toggle('active', mode==='new');
  document.getElementById('sortOld').classList.toggle('active', mode==='old');
  renderList();
}

document.getElementById('searchBox').addEventListener('input', renderList);

// Toast
let toastTimer;
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

// Gemini Script
function toggleScript() {
  const content = document.getElementById('scriptContent');
  const label = document.getElementById('scriptToggleText');
  const isOpen = content.classList.toggle('open');
  label.textContent = isOpen ? 'Gizlət' : 'Göstər';
  if (isOpen && !document.getElementById('scriptBody').textContent) renderScript();
}

function renderScript() {
  const code = `<span class="cm"># Gemini AI Studio-da bu skripti işlət</span>
<span class="cm"># pip install cloudinary</span>

<span class="kw">import</span> cloudinary
<span class="kw">import</span> cloudinary.uploader
<span class="kw">import</span> json
<span class="kw">from</span> datetime <span class="kw">import</span> datetime
